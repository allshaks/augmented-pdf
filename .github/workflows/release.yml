name: Release Obsidian plugin

# Cut a release by pushing a version tag that matches manifest.json's version, e.g.:
#   git tag 0.0.1 && git push origin 0.0.1
# (Obsidian convention: no leading "v" on the tag.)

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install & build
        run: |
          npm install
          npm run build

      - name: Create GitHub release with built assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            main.js manifest.json styles.css
